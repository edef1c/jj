syntax = "proto3";

package simple_store;

message TreeValue {
  message File {
    bytes id = 1;
    bool executable = 2;
    bytes copy_id = 3;
  }

  oneof value {
    File file = 2;
    bytes symlink_id = 3;
    bytes tree_id = 4;
  }
}

message Tree {
  message Entry {
    string name = 1;
    TreeValue value = 2;
  }

  repeated Entry entries = 1;
}

message Commit {
  repeated bytes parents = 1;
  repeated bytes predecessors = 2;
  // Alternating positive and negative terms
  repeated bytes root_tree = 3;
  // Labels for the terms of a conflict.
  repeated string conflict_labels = 10;
  // Subtree prefixes for the parents, in internal path format
  // ('/'-separated components). Either empty or with the same number of
  // entries as `parents`. An empty string means the parent's tree is not
  // shifted.
  //
  // The field number is deliberately high to avoid colliding with fields
  // added upstream while this feature is out of tree.
  repeated string subtree_prefixes = 57;
  bytes change_id = 4;
  string description = 5;

  message Timestamp {
    int64 millis_since_epoch = 1;
    int32 tz_offset = 2;
  }
  message Signature {
    string name = 1;
    string email = 2;
    Timestamp timestamp = 3;
  }
  Signature author = 6;
  Signature committer = 7;
  optional bytes secure_sig = 9;
}
